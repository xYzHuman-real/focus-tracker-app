<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style_v2.css">
</head>
<body>

  <!-- Auth Section -->
  <div class="container" id="authSection">
    <h2>Login / Sign Up</h2>
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Sign Up</button>
    <p id="authMessage"></p>
  </div>

  <!-- Main App Section -->
  <div class="container" id="mainSection" style="display:none;">

    <!-- Top Bar -->
    <div class="top-bar">
      <h1>Focus Tracker</h1>
      <button id="themeToggle">🌙</button>
      <button id="logoutBtn">Logout</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
      <div class="stat-box">
        <h3>Total Hours</h3>
        <p id="dashboardHours">0</p>
      </div>
      <div class="stat-box">
        <h3>🔥 Streak</h3>
        <p id="dashboardStreak">0</p>
      </div>
    </div>

    <!-- Profile Section -->
    <div class="section" id="profileSection">
      <h2>Profile</h2>
      <p id="profileEmail"></p>
      <input type="text" id="displayNameInput" placeholder="Display Name">
      <button id="updateProfileBtn">Update Profile</button>
    </div>

    <!-- Study Section -->
    <div class="section">
      <h2>Add Study Session (Hours)</h2>
      <input type="number" id="studyInput" placeholder="Enter hours">
      <button id="addStudyBtn">Add Study</button>
      <p>Total Study Hours: <span id="totalHours">0</span></p>
      <p>🔥 Daily Streak: <span id="streakCount">0</span> days</p>
      <button id="exportBtn">📄 Export Report</button>
    </div>

    <!-- Daily Goal -->
    <div class="section">
      <h2>Set Daily Goal (Hours)</h2>
      <input type="number" id="dailyGoalInput" placeholder="Enter goal">
      <button id="setGoalBtn">Set Goal</button>
      <div id="goalProgressContainer">
        <div id="goalProgressBar"></div>
      </div>
      <p id="goalText">Goal: 0 / 0 hours</p>
      <p id="goalAlert" style="display:none;">🎉 Goal achieved!</p>
    </div>

    <!-- Community Section -->
    <div class="section" id="communitySection">
      <h2>Community Group</h2>
      <input type="text" id="postInput" placeholder="Share your progress...">
      <button id="postBtn">Post</button>
      <ul id="postList"></ul>
    </div>

  </div>

  <!-- Firebase SDKs -->
  <script type="module" src="script.js"></script>
</body>
                                     </html>
