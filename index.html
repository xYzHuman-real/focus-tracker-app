<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTracker | Master Cloud</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --accent-teal: #10b981;
            --text-main: #f8fafc; --text-dim: #94a3b8; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.2s ease; }
        body { background: var(--bg-dark); color: var(--text-main); margin: 0; padding-bottom: 100px; }

        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card-bg); padding: 35px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        
        /* Layout */
        .view { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid #334155; }
        .stat-val { font-size: 22px; font-weight: 800; color: var(--accent-teal); display: block; }
        .stat-label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Timer */
        .timer-circle { width: 180px; height: 180px; border: 6px solid #334155; border-top-color: var(--accent-teal); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; }

        /* Lists (Habits & Study) */
        .item-row { background: var(--card-bg); padding: 12px 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .done-text { text-decoration: line-through; color: var(--text-dim); opacity: 0.6; }

        /* Chat Box */
        #chat-box { height: 250px; background: #0f172a; border-radius: 15px; padding: 15px; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #334155; }
        .msg { padding: 8px 12px; border-radius: 12px; font-size: 12px; max-width: 80%; line-height: 1.4; }
        .msg.me { background: var(--accent-teal); align-self: flex-end; color: white; }
        .msg.them { background: var(--card-bg); align-self: flex-start; border: 1px solid #334155; }

        /* UI Elements */
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; outline: none; }
        .btn { background: var(--accent-teal); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-sec { background: #334155; margin-top: 8px; }

        /* Nav */
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #1e293b; border-radius: 20px; height: 70px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #475569; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--accent-teal); }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:var(--accent-teal)">FocusTracker Pro</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">Sign In</button>
            <button class="btn btn-sec" onclick="handleAuth('signup')">Create Account</button>
            <p id="auth-error" style="color:var(--danger); font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        
        <div id="view-dashboard" class="view active">
            <h1 id="user-title">Hello!</h1>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">Total Hours</span><span class="stat-val" id="d-hours">0.0</span></div>
                <div class="stat-card"><span class="stat-label">Goal Met</span><span class="stat-val" id="d-goal">0%</span></div>
                <div class="stat-card"><span class="stat-label">Habits</span><span class="stat-val" id="d-habits">0%</span></div>
                <div class="stat-card"><span class="stat-label">Streak</span><span class="stat-val" id="d-streak">0</span></div>
            </div>
            <div class="stat-card" style="margin-top:15px; border-color:var(--accent-teal);">
                <b>Weekly Progress</b>
                <div style="display:flex; align-items:flex-end; height:60px; gap:10px; margin-top:10px;">
                    <div style="flex:1; background:#334155; border-radius:4px; height:30%;"></div>
                    <div style="flex:1; background:#334155; border-radius:4px; height:60%;"></div>
                    <div id="today-bar" style="flex:1; background:var(--accent-teal); border-radius:4px; height:0%;"></div>
                </div>
            </div>
        </div>

        <div id="view-study" class="view">
            <h1>Study Sessions</h1>
            <div class="input-group">
                <input type="text" id="s-name" placeholder="Subject (e.g. Physics)">
                <input type="number" id="s-hrs" placeholder="Hours spent">
                <button class="btn" onclick="addStudy()">Log Session</button>
            </div>
            <div id="study-list"></div>
        </div>

        <div id="view-habits" class="view">
            <h1>Daily Habits</h1>
            <div class="input-group">
                <input type="text" id="h-input" placeholder="New habit name...">
                <button class="btn" onclick="addHabit()">Add Habit</button>
            </div>
            <div id="habit-list"></div>
        </div>

        <div id="view-timer" class="view">
            <h1 style="text-align:center;">Deep Work</h1>
            <div class="timer-circle" id="timer-display">25:00</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" id="timer-btn" onclick="toggleTimer()">Start</button>
                <button class="btn btn-sec" onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <div id="view-community" class="view">
            <h1>Global Chat</h1>
            <div id="chat-box"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chat-input" placeholder="Message..." style="margin-bottom:0;">
                <button class="btn" style="width:50px;" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="view-profile" class="view">
            <h1>Settings</h1>
            <div class="stat-card" style="text-align:center;">
                <p id="profile-email">---</p>
                <button class="btn" style="background:var(--danger)" onclick="logout()">Logout Account</button>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="nav('dashboard', this)"><i class="fas fa-th-large"></i>Dash</div>
            <div class="nav-item" onclick="nav('study', this)"><i class="fas fa-book"></i>Study</div>
            <div class="nav-item" onclick="nav('habits', this)"><i class="fas fa-check-circle"></i>Habits</div>
            <div class="nav-item" onclick="nav('timer', this)"><i class="fas fa-stopwatch"></i>Timer</div>
            <div class="nav-item" onclick="nav('community', this)"><i class="fas fa-users"></i>Chat</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0txpbZjCwn6TSWF6rCnPlq46th9L-N5w",
            authDomain: "focustrackerapp-c3b36.firebaseapp.com",
            projectId: "focustrackerapp-c3b36",
            storageBucket: "focustrackerapp-c3b36.firebasestorage.app",
            messagingSenderId: "985621079314",
            appId: "1:985621079314:web:a5f8661196d5e353d5ffcb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let state = { hours: 0, streak: 0, sessions: [], habits: [] };
        let timerSeconds = 1500;
        let timerInterval = null;

        // AUTH & SYNC
        window.handleAuth = (t) => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            (t === 'signup' ? createUserWithEmailAndPassword : signInWithEmailAndPassword)(auth, e, p).catch(err => document.getElementById('auth-error').textContent = err.message);
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('profile-email').textContent = u.email;
                document.getElementById('user-title').textContent = "Hey, " + u.email.split('@')[0];
                const snap = await getDoc(doc(db, "users", u.uid));
                if (snap.exists()) state = snap.data();
                render(); loadChat();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        const cloudSave = async () => { if(auth.currentUser) await setDoc(doc(db, "users", auth.currentUser.uid), state); render(); };

        // FEATURES
        window.addStudy = () => {
            const n = document.getElementById('s-name'), h = document.getElementById('s-hrs');
            if(!n.value || !h.value) return;
            state.sessions.push({id: Date.now(), name: n.value, hrs: parseFloat(h.value)});
            state.hours += parseFloat(h.value);
            n.value = ''; h.value = ''; cloudSave();
        };

        window.addHabit = () => {
            const i = document.getElementById('h-input');
            if(!i.value) return;
            state.habits.push({id: Date.now(), name: i.value, done: false});
            i.value = ''; cloudSave();
        };

        window.toggleHabit = (id) => {
            const h = state.habits.find(x => x.id === id);
            h.done = !h.done; cloudSave();
        };

        window.deleteItem = (type, id) => {
            if(type === 's') {
                state.hours -= state.sessions.find(x => x.id === id).hrs;
                state.sessions = state.sessions.filter(x => x.id !== id);
            } else { state.habits = state.habits.filter(x => x.id !== id); }
            cloudSave();
        };

        // TIMER
        window.toggleTimer = () => {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('timer-btn').textContent = "Resume"; }
            else {
                document.getElementById('timer-btn').textContent = "Pause";
                timerInterval = setInterval(() => {
                    timerSeconds--; updateTimerDisplay();
                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval); state.hours += 0.4;
                        alert("Session Complete!"); resetTimer(); cloudSave();
                    }
                }, 1000);
            }
        };
        window.resetTimer = () => { clearInterval(timerInterval); timerInterval = null; timerSeconds = 1500; updateTimerDisplay(); };
        const updateTimerDisplay = () => {
            const m = Math.floor(timerSeconds/60), s = timerSeconds%60;
            document.getElementById('timer-display').textContent = `${m}:${s < 10 ? '0'+s : s}`;
        };

        // CHAT
        window.sendMessage = async () => {
            const i = document.getElementById('chat-input'); if (!i.value) return;
            await addDoc(collection(db, "messages"), { text: i.value, user: auth.currentUser.email, uid: auth.currentUser.uid, time: serverTimestamp() });
            i.value = '';
        };
        function loadChat() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"), limit(30));
            onSnapshot(q, (snap) => {
                document.getElementById('chat-box').innerHTML = snap.docs.map(d => {
                    const m = d.data(); const isMe = m.uid === auth.currentUser.uid;
                    return `<div class="msg ${isMe ? 'me' : 'them'}"><b>${m.user.split('@')[0]}:</b><br>${m.text}</div>`;
                }).join('');
                document.getElementById('chat-box').scrollTop = 9999;
            });
        }

        // NAV & RENDER
        window.nav = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            el.classList.add('active');
        };

        function render() {
            document.getElementById('d-hours').textContent = (state.hours || 0).toFixed(1);
            document.getElementById('d-streak').textContent = state.streak || 0;
            const goal = Math.min(((state.hours || 0) / 8) * 100, 100);
            document.getElementById('d-goal').textContent = Math.round(goal) + "%";
            document.getElementById('today-bar').style.height = goal + "%";
            
            const doneH = (state.habits || []).filter(x => x.done).length;
            document.getElementById('d-habits').textContent = (state.habits?.length ? Math.round((doneH/state.habits.length)*100) : 0) + "%";

            document.getElementById('study-list').innerHTML = (state.sessions || []).map(s => `
                <div class="item-row"><span><b>${s.name}</b>: ${s.hrs}h</span><i class="fas fa-trash" onclick="deleteItem('s', ${s.id})"></i></div>
            `).join('');

            document.getElementById('habit-list').innerHTML = (state.habits || []).map(h => `
                <div class="item-row"><div onclick="toggleHabit(${h.id})"><i class="${h.done ? 'fas fa-check-circle' : 'far fa-circle'}" style="color:var(--accent-teal)"></i> <span class="${h.done ? 'done-text' : ''}">${h.name}</span></div><i class="fas fa-times" onclick="deleteItem('h', ${h.id})"></i></div>
            `).join('');
            if(goal >= 100) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
    </html>
