<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style_v2.css">

  <!-- Firebase SDKs -->
  <script type="module" src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.1.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js"></script>
</head>
<body>

  <!-- LOGIN / SIGNUP -->
  <div id="authContainer">
    <h2>Login / Signup</h2>
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Password">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
  </div>

  <!-- MAIN APP -->
  <div id="appContainer" style="display:none;">
    <!-- Top Bar -->
    <div class="top-bar">
      <h1>Focus Tracker</h1>
      <button id="logoutBtn">Logout</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
      <div class="stat-box">
        <h3>Total Hours</h3>
        <p id="dashboardHours">0</p>
      </div>
      <div class="stat-box">
        <h3>🔥 Streak</h3>
        <p id="dashboardStreak">0</p>
      </div>
    </div>

    <!-- Habit Section -->
    <div class="section">
      <h2>Add Habit</h2>
      <input type="text" id="habitInput" placeholder="Enter habit">
      <button id="addHabitBtn">Add Habit</button>
      <ul id="habitList"></ul>
    </div>

    <!-- Study Section -->
    <div class="section">
      <h2>Add Study Session (Hours)</h2>
      <input type="number" id="studyInput" placeholder="Enter hours">
      <button id="addStudyBtn">Add Study</button>
      <p>Total Study Hours: <span id="totalHours">0</span></p>
      <p>🔥 Daily Streak: <span id="streakCount">0</span> days</p>
      <button id="exportBtn">📄 Export Report</button>
    </div>

    <!-- Daily Goal Section -->
    <div class="section">
      <h2>Set Daily Goal (Hours)</h2>
      <input type="number" id="dailyGoalInput" placeholder="Enter goal">
      <button id="setGoalBtn">Set Goal</button>
      <div id="goalProgressContainer">
        <div id="goalProgressBar"></div>
      </div>
      <p id="goalText">Goal: 0 / 0 hours</p>
      <p id="goalAlert">🎉 Goal achieved!</p>
    </div>

    <!-- Community Section -->
    <div class="section">
      <h2>Community Groups</h2>
      <input type="text" id="groupInput" placeholder="Enter group name">
      <button id="createGroupBtn">Create Group</button>
      <ul id="groupList"></ul>
    </div>

    <!-- Group Chat / Progress Sharing -->
    <div class="section">
      <h2>Group Feed</h2>
      <select id="groupSelect"></select>
      <textarea id="postInput" placeholder="Share your progress..."></textarea>
      <button id="postBtn">Post</button>
      <ul id="postList"></ul>
    </div>

    <!-- Notifications -->
    <div class="section">
      <h2>Notifications</h2>
      <ul id="notificationsList"></ul>
    </div>
  </div>

  <!-- Script -->
  <script type="module" src="script.js"></script>
</body>
        </html>
