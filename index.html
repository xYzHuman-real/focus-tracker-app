<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style_v2.css">
</head>
<body>

  <div class="container">

    <!-- Top Bar -->
    <div class="top-bar">
      <h1>Focus Tracker</h1>
      <button id="themeToggle">🌙</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
      <div class="stat-box">
        <h3>Total Hours</h3>
        <p id="dashboardHours">0</p>
      </div>
      <div class="stat-box">
        <h3>🔥 Streak</h3>
        <p id="dashboardStreak">0</p>
      </div>
    </div>

    <!-- Habit Section -->
    <div class="section">
      <h2>Add Habit</h2>
      <input type="text" id="habitInput" placeholder="Enter habit">
      <button id="addHabitBtn">Add Habit</button>
      <ul id="habitList"></ul>
    </div>

    <!-- Study Section -->
    <div class="section">
      <h2>Add Study Session (Hours)</h2>
      <input type="number" id="studyInput" placeholder="Enter hours">
      <button id="addStudyBtn">Add Study</button>
      <p>Total Study Hours: <span id="totalHours">0</span></p>
      <p>🔥 Daily Streak: <span id="streakCount">0</span> days</p>
      <button id="exportBtn">📄 Export Report</button>
    </div>
      <!-- Goal Progress Bar -->
<div id="goalProgressContainer" style="margin-top: 10px; background: #ccc; border-radius: 10px; height: 20px; width: 100%;">
  <div id="goalProgressBar" style="width: 0%; height: 100%; background-color: #ff4757; border-radius: 10px;"></div>
</div>

<!-- Goal Text -->
<p id="goalText">Goal: 0 / 0 hours</p>

<!-- Daily Goal Section -->
<div class="section">
  <h2>Set Daily Goal (Hours)</h2>
  <input type="number" id="dailyGoalInput" placeholder="Enter goal">
  <button id="setGoalBtn">Set Goal</button>

  <!-- Goal Progress Bar -->
  <div id="goalProgressContainer" style="margin-top: 10px; background: #ccc; border-radius: 10px; height: 20px; width: 100%;">
    <div id="goalProgressBar" style="width: 0%; height: 100%; background-color: #ff4757; border-radius: 10px;"></div>
  </div>

  <!-- Goal Text -->
  <p id="goalText">Goal: 0 / 0 hours</p>

  <!-- Goal Alert -->
  <p id="goalAlert" style="color: var(--accent-color); font-weight: bold; display: none;">🎉 Goal achieved!</p>
</div>
